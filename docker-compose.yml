version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xuecile-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NUXT_MYSQL_URL=mysql://root:123456@db:3306/danci
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=danci
      - DB_PORT=3306
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "npx drizzle-kit push && node .output/server/index.mjs"

  db:
    image: mysql:8.0
    container_name: xuecile-db
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=danci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
